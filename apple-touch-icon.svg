<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#1a1f3a"/>
  <!-- Ball shadow -->
  <ellipse cx="92" cy="102" rx="45" ry="7.5" fill="#000" opacity="0.25"/>
  <!-- Ball body -->
  <circle cx="90" cy="82" r="49" fill="#f0ead6" stroke="#222" stroke-width="2"/>
  <!-- Ball highlight -->
  <ellipse cx="75" cy="65" rx="15" ry="9" fill="#fff" opacity="0.20"/>
  <!-- Handball panel lines -->
  <path d="M41,82 Q90,43 139,82" stroke="#2a2a2a" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M41,82 Q90,121 139,82" stroke="#2a2a2a" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M90,33 Q55,82 90,131" stroke="#2a2a2a" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M90,33 Q125,82 90,131" stroke="#2a2a2a" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- Horizontal equator -->
  <line x1="41" y1="82" x2="139" y2="82" stroke="#2a2a2a" stroke-width="2.3" stroke-linecap="round" opacity="0.6"/>
  <!-- App name -->
  <text x="90" y="153" text-anchor="middle" font-family="system-ui,Arial,sans-serif" font-size="19" font-weight="800" fill="#e2e8f0" letter-spacing="2.5" opacity="0.9">HANDBALL</text>
</svg>
